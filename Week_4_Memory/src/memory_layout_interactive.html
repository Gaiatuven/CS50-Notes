
<style>
  .mem-cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 44px;
    border: 0.5px solid var(--color-border-secondary);
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 500;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    transition: background 0.3s, color 0.3s;
    flex-shrink: 0;
    position: relative;
  }
  .mem-cell.amber { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
  .mem-cell.green { background: #EAF3DE; color: #27500A; border-color: #639922; }
  .mem-cell.blue  { background: #E6F1FB; color: #0C447C; border-color: #378ADD; }
  .mem-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .addr-row {
    display: flex;
    gap: 0;
    margin-top: 4px;
  }
  .addr-label {
    width: 40px;
    flex-shrink: 0;
    text-align: center;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--color-text-secondary);
    font-style: italic;
  }
  .step-btn {
    padding: 6px 16px;
    font-size: 13px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.15s;
  }
  .step-btn:hover { background: var(--color-background-secondary); }
  .step-btn:disabled { opacity: 0.4; cursor: default; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 2px; display: inline-block; flex-shrink: 0;
  }
  .code-block {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 14px;
    line-height: 1.9;
    margin-top: 12px;
  }
  .code-line { transition: color 0.3s, font-weight 0.3s; }
  .code-line.active { color: var(--color-text-primary); font-weight: 500; }
  .binary-toggle {
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 4px 10px;
    background: var(--color-background-primary);
  }
  .binary-toggle:hover { background: var(--color-background-secondary); }
  .indicator {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--color-border-secondary);
    margin: 0 3px;
    transition: background 0.2s;
  }
  .indicator.active { background: var(--color-text-primary); }
</style>

<div style="padding: 1rem 0;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
    <div>
      <span id="indicator-0" class="indicator active"></span>
      <span id="indicator-1" class="indicator"></span>
      <span id="indicator-2" class="indicator"></span>
      <span id="indicator-3" class="indicator"></span>
    </div>
    <button class="binary-toggle" id="binBtn" onclick="toggleBinary()">Show binary</button>
  </div>

  <div class="mem-row" id="mem-row"></div>
  <div class="addr-row" id="addr-row"></div>

  <div class="code-block" id="code-block">
    <div class="code-line" id="cl-0">// empty memory</div>
    <div class="code-line" id="cl-1">char c = 'H';</div>
    <div class="code-line" id="cl-2">int speedlimit = 65;</div>
    <div class="code-line" id="cl-3">string surname = "Lloyd";</div>
  </div>

  <div id="desc" style="font-size:13px; color:var(--color-text-secondary); margin-top:12px; min-height:36px; line-height:1.6;"></div>

  <div style="display:flex; gap:10px; margin-top:16px; align-items:center;">
    <button class="step-btn" id="prevBtn" onclick="go(-1)" disabled>← Prev</button>
    <button class="step-btn" id="nextBtn" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
const N = 19;
let step = 0;
let showBinary = false;

const steps = [
  {
    label: "Empty memory — 19 bytes, all uninitialized.",
    cells: Array(N).fill({ val: '', color: '' }),
    addrMode: 'decimal',
    active: -1
  },
  {
    label: "char c = 'H' — a char is 1 byte. 'H' has ASCII value 72 (binary: 01001000). Stored at address 4.",
    cells: (() => {
      const c = Array(N).fill({ val: '', color: '' });
      c[4] = { val: 'H', valBin: '01001000', color: 'amber' };
      return c;
    })(),
    addrMode: 'decimal',
    active: 1
  },
  {
    label: "int speedlimit = 65 — an int is 4 bytes. Value 65 spans addresses 8–11. In 32-bit binary: 00000000 00000000 00000000 01000001.",
    cells: (() => {
      const c = Array(N).fill({ val: '', color: '' });
      c[4] = { val: 'H', valBin: '01001000', color: 'amber' };
      c[8]  = { val: '00', valBin: '0000\n0000', color: 'green' };
      c[9]  = { val: '00', valBin: '0000\n0000', color: 'green' };
      c[10] = { val: '00', valBin: '0000\n0000', color: 'green' };
      c[11] = { val: '65', valBin: '0100\n0001', color: 'green' };
      return c;
    })(),
    addrMode: 'decimal',
    active: 2
  },
  {
    label: "string surname = \"Lloyd\" — a string is 5 chars + a null terminator '\\0'. Each char is 1 byte, stored at addresses 12–17.",
    cells: (() => {
      const c = Array(N).fill({ val: '', color: '' });
      c[4] = { val: 'H', valBin: '01001000', color: 'amber' };
      c[8]  = { val: '00', valBin: '0000\n0000', color: 'green' };
      c[9]  = { val: '00', valBin: '0000\n0000', color: 'green' };
      c[10] = { val: '00', valBin: '0000\n0000', color: 'green' };
      c[11] = { val: '65', valBin: '0100\n0001', color: 'green' };
      c[12] = { val: 'L', color: 'blue' };
      c[13] = { val: 'l', color: 'blue' };
      c[14] = { val: 'o', color: 'blue' };
      c[15] = { val: 'y', color: 'blue' };
      c[16] = { val: 'd', color: 'blue' };
      c[17] = { val: '\\0', color: 'blue' };
      return c;
    })(),
    addrMode: 'hex',
    active: 3
  }
];

function getAddr(i, mode) {
  return mode === 'hex' ? '0x' + i.toString(16).toUpperCase() : String(i);
}

function render() {
  const s = steps[step];
  const row = document.getElementById('mem-row');
  const addrRow = document.getElementById('addr-row');

  row.innerHTML = '';
  addrRow.innerHTML = '';

  s.cells.forEach((cell, i) => {
    const el = document.createElement('div');
    el.className = 'mem-cell' + (cell.color ? ' ' + cell.color : '');
    let content = '';
    if (showBinary && cell.valBin) {
      content = cell.valBin.replace('\n', '<br>');
      el.style.fontSize = '8px';
      el.style.lineHeight = '1.3';
    } else {
      content = cell.val || '';
      el.style.fontSize = '11px';
      el.style.lineHeight = '1';
    }
    el.innerHTML = content;
    row.appendChild(el);

    const a = document.createElement('div');
    a.className = 'addr-label';
    a.textContent = getAddr(i, s.addrMode);
    addrRow.appendChild(a);
  });

  document.getElementById('desc').textContent = s.label;

  for (let i = 0; i < 4; i++) {
    const cl = document.getElementById('cl-' + i);
    cl.classList.toggle('active', i === s.active);
  }
  for (let i = 0; i < 4; i++) {
    document.getElementById('indicator-' + i).classList.toggle('active', i === step);
  }

  document.getElementById('prevBtn').disabled = step === 0;
  document.getElementById('nextBtn').disabled = step === steps.length - 1;
}

function go(dir) {
  step = Math.max(0, Math.min(steps.length - 1, step + dir));
  render();
}

function toggleBinary() {
  showBinary = !showBinary;
  document.getElementById('binBtn').textContent = showBinary ? 'Show values' : 'Show binary';
  render();
}

render();
</script>
